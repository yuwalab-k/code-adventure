<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World 1 - Stage 1 Field Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #e4e7ea;
    --ink: #1c1c1c;
    --mid: #8a9098;
    --path: #ccd2d8;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:#cfcdbc;
    color: var(--ink);
    font-family: 'Press Start 2P', monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px 12px;
  }

  .viewport{
    width: 100%;
    max-width: 640px;
    background: var(--paper);
    border: 4px solid var(--ink);
  }

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 14px;
    font-size: 10px;
    background: var(--paper);
    border-bottom: 3px solid var(--ink);
  }
  .hud .pos{ color: var(--mid); }

  .map{
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-auto-rows: 64px;
  }
  .cell{
    position: relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><rect width='2' height='2' fill='%238a9098'/></svg>");
    background-size: 8px 8px;
  }
  .cell.path{
    background-image: none;
    background-color: var(--path);
  }
  .cell.goal{
    background-color: var(--path);
    outline: 2px dashed var(--ink);
    outline-offset: -6px;
  }
  .cell svg{ width: 68%; height: 68%; }
  .cell .goal-label{
    font-size: 7px;
    line-height: 1.6;
    text-align:center;
  }

  .caption{
    padding: 10px 14px 14px;
    font-size: 8px;
    line-height: 1.9;
    color: var(--mid);
    border-top: 3px solid var(--ink);
  }
  .caption b{ color: var(--ink); }
</style>
</head>
<body>

<div class="viewport">
  <div class="hud">
    <span>WORLD 1 - PRACTICE FIELD</span>
    <span class="pos">STAGE 01</span>
  </div>

  <div class="map">
    <!-- row 1 -->
    <div class="cell"></div>
    <div class="cell">
      <svg viewBox="0 0 14 10"><g fill="#1c1c1c"><rect x="3" y="2" width="8" height="1"/><rect x="1" y="3" width="12" height="5"/><rect x="2" y="8" width="10" height="1"/></g></svg>
    </div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell">
      <svg viewBox="0 0 12 15"><g fill="#1c1c1c"><rect x="5" y="9" width="2" height="6"/><rect x="2" y="1" width="8" height="8"/></g></svg>
    </div>
    <div class="cell"></div>
    <div class="cell"></div>

    <!-- row 2 -->
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

    <!-- row 3: path with robot -->
    <div class="cell path"></div>
    <div class="cell path"></div>
    <div class="cell path">
      <svg viewBox="0 0 14 16">
        <g fill="#1c1c1c">
          <rect x="6" y="0" width="2" height="1"/>
          <rect x="2" y="1" width="10" height="8"/>
          <rect x="3" y="9" width="8" height="4"/>
          <rect x="3" y="13" width="3" height="2"/>
          <rect x="8" y="13" width="3" height="2"/>
        </g>
        <g fill="#e4e7ea">
          <rect x="4.5" y="4" width="2" height="2.6"/>
          <rect x="7.5" y="4" width="2" height="2.6"/>
        </g>
      </svg>
    </div>
    <div class="cell path"></div>
    <div class="cell path"></div>
    <div class="cell path"></div>
    <div class="cell path"></div>
    <div class="cell path"></div>
    <div class="cell"></div>

    <!-- row 4: path turns down -->
    <div class="cell">
      <svg viewBox="0 0 14 9"><g fill="#1c1c1c"><rect x="1" y="4" width="3" height="3"/><rect x="4" y="2" width="6" height="5"/><rect x="10" y="4" width="3" height="3"/></g></svg>
    </div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell path"></div>
    <div class="cell path"></div>

    <!-- row 5 -->
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell path"></div>
    <div class="cell path">
      <svg viewBox="0 0 7 11"><g fill="#1c1c1c"><rect x="3" y="4" width="1" height="7"/><rect x="0" y="0" width="7" height="4"/></g><g fill="#e4e7ea"><rect x="1" y="1" width="5" height="2"/></g></svg>
    </div>

    <!-- row 6: goal -->
    <div class="cell">
      <svg viewBox="0 0 9 7"><g fill="#1c1c1c"><rect x="2" y="1" width="5" height="1"/><rect x="1" y="2" width="7" height="3"/><rect x="2" y="5" width="5" height="1"/></g></svg>
    </div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell path"></div>
    <div class="cell goal">
      <span class="goal-label">CODE<br>HERE</span>
    </div>
  </div>

  <div class="caption"><b>MAP</b> gray tiles = path leading to the code area (bottom-right, dashed) / dotted tiles = grass / robot standing on the path near the start</div>
</div>

</body>
</html>
