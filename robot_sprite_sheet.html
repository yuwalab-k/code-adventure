<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot sprite sheet (front / back / side)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#e4e7ea; --ink:#1c1c1c; --mid:#8a9098; }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:#cfd3d6; color:var(--ink);
    font-family:'Press Start 2P', monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px 12px;
  }
  svg.defs{ position:absolute; width:0; height:0; }
  .viewport{
    width:100%; max-width:560px;
    background:var(--paper);
    border:4px solid var(--ink);
    padding: 20px;
  }
  .title{ font-size:11px; margin-bottom:18px; }
  .row{
    display:flex; justify-content:space-around; align-items:flex-end;
    flex-wrap:wrap; gap:20px;
  }
  .sprite-box{ text-align:center; }
  .sprite-box svg{ width:72px; height:82px; filter:url(#scribble); }
  .sprite-box .label{ margin-top:10px; font-size:8px; color:var(--mid); }
</style>
</head>
<body>

<svg class="defs">
  <filter id="scribble">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="4" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
  </filter>
</svg>

<div class="viewport">
  <div class="title">ROBOT — 4 DIRECTIONS</div>
  <div class="row">

    <!-- DOWN / FRONT (existing design) -->
    <div class="sprite-box">
      <svg viewBox="0 0 14 16">
        <g fill="#1c1c1c">
          <rect x="6" y="0" width="2" height="1"/>
          <rect x="2" y="1" width="10" height="8"/>
          <rect x="3" y="9" width="8" height="4"/>
          <rect x="3" y="13" width="3" height="2"/>
          <rect x="8" y="13" width="3" height="2"/>
        </g>
        <g fill="#e4e7ea">
          <rect x="4.5" y="4" width="2" height="2.6"/>
          <rect x="7.5" y="4" width="2" height="2.6"/>
        </g>
      </svg>
      <div class="label">FRONT (DOWN)</div>
    </div>

    <!-- UP / BACK: no eyes visible, small antenna, back panel line -->
    <div class="sprite-box">
      <svg viewBox="0 0 14 16">
        <g fill="#1c1c1c">
          <rect x="6" y="0" width="2" height="1"/>
          <rect x="2" y="1" width="10" height="8"/>
          <rect x="3" y="9" width="8" height="4"/>
          <rect x="3" y="13" width="3" height="2"/>
          <rect x="8" y="13" width="3" height="2"/>
        </g>
        <g fill="#e4e7ea">
          <rect x="5" y="3" width="4" height="1"/>
        </g>
      </svg>
      <div class="label">BACK (UP)</div>
    </div>

    <!-- SIDE (right-facing): profile head, single eye, offset antenna -->
    <div class="sprite-box">
      <svg viewBox="0 0 14 16">
        <g fill="#1c1c1c">
          <rect x="8" y="0" width="2" height="1"/>
          <rect x="3" y="1" width="8" height="8"/>
          <rect x="3" y="9" width="8" height="4"/>
          <rect x="3" y="13" width="3" height="2"/>
          <rect x="7" y="13" width="3" height="2"/>
        </g>
        <g fill="#e4e7ea">
          <rect x="8" y="4" width="2" height="2.6"/>
        </g>
      </svg>
      <div class="label">SIDE (RIGHT)</div>
    </div>

    <!-- SIDE (left-facing) = mirrored right -->
    <div class="sprite-box">
      <svg viewBox="0 0 14 16" style="transform:scaleX(-1);">
        <g fill="#1c1c1c">
          <rect x="8" y="0" width="2" height="1"/>
          <rect x="3" y="1" width="8" height="8"/>
          <rect x="3" y="9" width="8" height="4"/>
          <rect x="3" y="13" width="3" height="2"/>
          <rect x="7" y="13" width="3" height="2"/>
        </g>
        <g fill="#e4e7ea">
          <rect x="8" y="4" width="2" height="2.6"/>
        </g>
      </svg>
      <div class="label">SIDE (LEFT, mirrored)</div>
    </div>

  </div>
</div>

</body>
</html>
