<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World 1 - Stage 1 Puzzle Mockup v2 (crayon-on-ground)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Walter+Turncoat&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #e4e7ea;
    --ink: #1c1c1c;
    --mid: #8a9098;
    --dirt: #d3cdbe;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:#cfd3d6;
    color: var(--ink);
    font-family: 'Press Start 2P', monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px 12px;
  }

  svg.defs{ position:absolute; width:0; height:0; }

  .viewport{
    width: 100%;
    max-width: 640px;
    background: var(--paper);
    border: 4px solid var(--ink);
  }

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 14px;
    font-size: 10px;
    background: var(--paper);
    border-bottom: 3px solid var(--ink);
  }
  .hud .pos{ color: var(--mid); }

  /* the field: grass texture, with a worn dirt patch where the code is written */
  .stage{
    position: relative;
    min-height: 360px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><rect width='2' height='2' fill='%238a9098'/></svg>");
    background-size: 8px 8px;
    padding: 30px 20px;
  }

  .dirt-patch{
    position: relative;
    background: var(--dirt);
    border-radius: 3px;
    padding: 26px 44px;
    filter: url(#roughen);
  }
  .dirt-patch::before{
    content:"";
    position:absolute; inset:0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='6' height='6'><rect width='1.4' height='1.4' fill='%23b9b2a0'/></svg>");
    background-size: 10px 10px;
    opacity: 0.6;
  }

  .codeline{
    position: relative;
    display:flex;
    align-items:center;
    margin: 0 0 10px 0;
    flex-wrap: wrap;
  }
  .codeline:last-child{ margin-bottom:0; }

  .tok{
    font-family:'Walter Turncoat', cursive;
    font-size: 22px;
    color: var(--ink);
    margin-right: 10px;
    white-space: nowrap;
    line-height: 1;
  }
  .tok.str{ color: #5a5348; }

  .blank{
    position: relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width: 58px;
    height: 34px;
    margin-right: 6px;
  }
  .blank svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .blank .q{
    position:relative; z-index:1;
    font-family:'Walter Turncoat', cursive;
    font-size: 18px;
    color: var(--mid);
  }
  .blank.filled .q{ color: var(--paper); font-weight: bold; }
  .blank.active .q{ color: var(--ink); font-weight: bold; }

  .robot-mini{
    display:inline-flex;
    margin-left: 4px;
    vertical-align: middle;
    animation: nudge 1.1s ease-in-out infinite;
  }
  @keyframes nudge{
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(4px); }
  }
  .blank.active{
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .robot-mini svg{ width: 30px; height: 34px; }

  .inventory{
    margin-top: 22px;
    padding-top: 16px;
    border-top: 3px dashed var(--mid);
  }
  .inventory-label{
    font-size: 8px;
    color: var(--mid);
    margin-bottom: 12px;
  }
  .parts{
    display:flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items:center;
  }
  .part{
    position: relative;
    font-family:'Walter Turncoat', cursive;
    font-size: 20px;
    color: var(--paper);
    padding: 2px 6px;
  }
  .part svg{ position:absolute; inset:-6px -4px; width:calc(100% + 8px); height:calc(100% + 12px); z-index:0; }
  .part span{ position:relative; z-index:1; }

  .caption{
    padding: 10px 14px 14px;
    font-size: 8px;
    line-height: 1.9;
    color: var(--mid);
    border-top: 3px solid var(--ink);
  }
  .caption b{ color: var(--ink); }
</style>
</head>
<body>

<svg class="defs">
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4"/>
  </filter>
  <filter id="scribble">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="3" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4"/>
  </filter>
</svg>

<div class="viewport">
  <div class="hud">
    <span>WORLD 1 - PRACTICE FIELD</span>
    <span class="pos">STAGE 01</span>
  </div>

  <div class="stage">
    <div class="dirt-patch">

      <div class="codeline">
        <span class="tok">robot.move(</span><span class="tok str">"right"</span><span class="tok">)</span>
      </div>

      <div class="codeline">
        <span class="tok">robot.move(</span>
        <span class="blank filled">
          <svg viewBox="0 0 58 34" filter="url(#scribble)"><rect x="2" y="2" width="54" height="30" rx="8" fill="#1c1c1c"/></svg>
          <span class="q">"right"</span>
        </span>
        <span class="tok">)</span>
      </div>

      <div class="codeline">
        <span class="tok">robot.move(</span>
        <span class="blank active">
          <svg viewBox="0 0 58 34" filter="url(#scribble)"><rect x="2" y="2" width="54" height="30" rx="8" fill="none" stroke="#1c1c1c" stroke-width="3"/></svg>
          <span class="q">?</span>
        </span>
        <span class="tok">)</span>
        <span class="robot-mini">
          <svg viewBox="0 0 14 16" filter="url(#scribble)">
            <g fill="#1c1c1c">
              <rect x="6" y="0" width="2" height="1"/>
              <rect x="2" y="1" width="10" height="8"/>
              <rect x="3" y="9" width="8" height="4"/>
              <rect x="3" y="13" width="3" height="2"/>
              <rect x="8" y="13" width="3" height="2"/>
            </g>
            <g fill="#e4e7ea">
              <rect x="4.5" y="4" width="2" height="2.6"/>
              <rect x="7.5" y="4" width="2" height="2.6"/>
            </g>
          </svg>
        </span>
      </div>

      <div class="codeline">
        <span class="tok">robot.move(</span>
        <span class="blank">
          <svg viewBox="0 0 58 34" filter="url(#scribble)"><rect x="2" y="2" width="54" height="30" rx="8" fill="none" stroke="#1c1c1c" stroke-width="2.2" stroke-dasharray="6 5"/></svg>
          <span class="q">?</span>
        </span>
        <span class="tok">)</span>
      </div>

    </div>

    <div class="inventory">
      <div class="inventory-label">落ちてるパーツ</div>
      <div class="parts">
        <span class="part">
          <svg viewBox="0 0 60 34" filter="url(#scribble)"><rect x="2" y="2" width="56" height="30" rx="8" fill="#1c1c1c"/></svg>
          <span>"down"</span>
        </span>
        <span class="part">
          <svg viewBox="0 0 40 34" filter="url(#scribble)"><rect x="2" y="2" width="36" height="30" rx="8" fill="#1c1c1c"/></svg>
          <span>"up"</span>
        </span>
        <span class="part">
          <svg viewBox="0 0 46 34" filter="url(#scribble)"><rect x="2" y="2" width="42" height="30" rx="8" fill="#1c1c1c"/></svg>
          <span>"left"</span>
        </span>
      </div>
    </div>
  </div>

  <div class="caption"><b>凡例</b> 荒れた地面のエリア=コードが直接書かれた一角／点線の輪=歯抜け（未生成）／太い輪=今ロボが操作中の歯抜け／実線で埋まった輪=はめ込み済み</div>
</div>

</body>
</html>
